<div
  fxLayout="row"
  fxLayoutAlign="start center"
>
  <h2>
    <strong>
      {{(isEditForm ? 'taskManagement.taskDetail.editTitle' : 'taskManagement.taskDetail.newTitle') | translate}}
    </strong>
  </h2>
</div>
<form
  [formGroup]="formGroup"
  (ngSubmit)="onSaveClick()"
>
  <div *ngFor="let control of jsonFormControls">
    <app-dynamic-form-control
      [form]="formGroup"
      [control]="control"
    ></app-dynamic-form-control>
  </div>
  <div
    fxLayout="row"
    fxLayoutAlign="end center"
    fxLayoutGap="10px"
  >
    <button
      mat-flat-button
      color="warn"
      (click)="onCancelClick()"
      type="button"
    >
      {{'buttons.cancelButton' | translate}}
    </button>
    <button
      [disabled]="!formGroup.valid"
      mat-flat-button
      color="primary"
      type="submit"
    >
      {{'buttons.chooseButton' | translate}}
    </button>
  </div>
</form>
